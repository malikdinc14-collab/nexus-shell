# Nexus-Shell Yazi Configuration
# VSCode-style file navigator

[mgr]
ratio = [2, 1, 0]
show_hidden = true
sort_by = "natural"
sort_dir_first = true
linemode = "size"

[opener]
edit = [
    { run = 'zsh "${NEXUS_HOME:-$HOME/.config/nexus-shell}/lib/yazi_open.sh" "$@"', block = false, desc = "Open in Editor" }
]
nexus_open = [
    { run = 'zsh "${NEXUS_HOME:-$HOME/.config/nexus-shell}/lib/yazi_open.sh" "$@"', block = false, desc = "Nexus Open" }
]

[open]
prepend_rules = [
    { name = "*", use = "nexus_open" }
]
