# --- Nexus-Shell TMUX Configuration ---

# === Session Lifecycle ===
# When the terminal window is closed, the hook runs guard.sh which:
#   1. Walks the process tree of every pane (kills opencode, nvim, etc.)
#   2. Calls tmux kill-session at the end
# We do NOT use destroy-unattached because it races with the hook.
set-hook -g client-detached 'run-shell "$NEXUS_BOOT/guard.sh exit"'

# === Performance ===
set -g mouse on
setw -g aggressive-resize on
set -g status-interval 2
set -s escape-time 50

# === Clipboard Integration (Platform Agnostic) ===
set -s set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Axiom: Dynamic Clip-Detection
if-shell "command -v pbcopy" {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    if-shell "command -v xclip" {
        bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
        bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
        bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
    }
}

# === True Color Support ===
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# === Theme: Nexus Cyber ===
set -g status-bg "#0a0e14"
set -g status-fg cyan
set -g pane-border-style fg="#1a1f2c"
set -g pane-active-border-style fg=cyan
set -g message-style bg="#0a0e14",fg=yellow

# === Pane Titles & Tab Strip ===
set -g pane-border-status top
set -g pane-border-format "#[fg=cyan,bold] #(python3 $NEXUS_KERNEL/stack/stack-status.py #{pane_id}) #[default]#{?window_zoomed_flag,#[fg=yellow] (ZOOMED) ,}"

# === Status Bar (Nexus HUD) ===
set -g status-position top
set -g status-left-length 60
set -g status-left " #[fg=cyan,bold] NEXUS #[fg=white]|#{?#{@gap_mission}, #[fg=green,bold]🛡️ #{@gap_mission} ,} "
set -g status-right-length 100
set -g status-right "#[fg=cyan]#{pane_title} #[fg=white]| #(bash $NEXUS_HOME/core/ui/hud/modules/mesh.sh) #[fg=white]| #[fg=green]%H:%M"

# Window Status (Nexus-Tabs)
set -g window-status-format "#[fg=white,dim] #I:#W "
set -g window-status-current-format "#[fg=cyan,bold] #I:#W "
set -g window-status-separator "|"

# ============================================================
# MODULAR KEYBIND PROFILES
# ============================================================
source-file "$NEXUS_HOME/config/keybinds/active.conf"

# ============================================================
# CORE GLOBAL KEYBINDS
# ============================================================

# --- Swap Mode (Ctrl+Space) - Toggle Editor/Render ---
bind-key -n C-Space run-shell "$NEXUS_ENGINE/lib/swap.sh"

# --- Swap Tree (Alt+Shift+G) - Toggle Tree/Git ---
bind-key -n M-G run-shell "$NEXUS_ENGINE/lib/tree_swap.sh"

# Master Switcher (Alt-m) - Mosaic Mission Control
bind-key -n M-m run-shell "${NEXUS_KERNEL}/layout/mosaic_engine.sh start"

# Focus Mode (Alt-z) - Maximize current pane
bind-key -n M-z resize-pane -Z

# --- Git (Alt+G) --- lazygit in a popup
bind-key -n M-g display-popup -E -w 90% -h 90% "lazygit"

# --- AI Context (Alt+I / Alt+Shift+I) ---
bind-key -n M-i run-shell "$NEXUS_ENGINE/ai/send_context.sh"
bind-key -n M-I run-shell "$NEXUS_ENGINE/ai/pipe_error.sh"
