# --- Nexus-Shell TMUX Configuration ---

# === Session Lifecycle ===
# When the terminal window is closed, the hook runs guard.sh which:
#   1. Walks the process tree of every pane (kills opencode, nvim, etc.)
#   2. Calls tmux kill-session at the end
# We do NOT use destroy-unattached because it races with the hook.
set-hook -g client-detached 'run-shell "$NEXUS_HOME/core/boot/guard.sh exit"'

# === Performance ===
set -g mouse on
setw -g aggressive-resize on
set -g status-interval 2
set -s escape-time 50

# === Clipboard Integration (macOS) ===
set -s set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# === True Color Support ===
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# === Theme: Nexus Cyber ===
set -g status-bg "#0a0e14"
set -g status-fg cyan
set -g pane-border-style fg="#1a1f2c"
set -g pane-active-border-style fg=cyan
set -g message-style bg="#0a0e14",fg=yellow

# === Pane Titles & Tab Strip ===
set -g pane-border-status top
set -g pane-border-format "#[fg=cyan,bold] [ #{pane_title} ] #[default]#[fg=white]#{?window_zoomed_flag,#[fg=yellow] (ZOOMED) ,}"

# === Status Bar (Nexus-Tabs) ===
set -g status-position top
set -g @nexus_mode "INSERT"
set -g status-left-length 60
set -g status-left "#{?#{==:#{@nexus_mode},NORMAL},#[bg=yellow]#[fg=black]#[bold] NORMAL ,#[fg=cyan,bold] NEXUS }#[fg=white]|#{?#{@gap_mission}, #[fg=green,bold]🛡️ #{@gap_mission} ,} "
set -g status-right-length 60
set -g status-right "#[fg=cyan]#{pane_title} #[fg=white]| #[fg=green]%H:%M"

# Window Status (Nexus-Tabs)
set -g window-status-format "#[fg=white,dim] #I:#W "
set -g window-status-current-format "#[fg=cyan,bold] #I:#W "
set -g window-status-separator "|"

# ============================================================
# MODULAR KEYBIND PROFILES
# ============================================================
# Load the active keybind profile (Default, Vim-Heavy, Minimal, etc.)
source-file "$NEXUS_HOME/config/keybinds/active.conf"

# ============================================================
# CORE GLOBAL KEYBINDS (Unchanged across profiles)
# ============================================================

# --- Swap Mode (Ctrl+Space) - Toggle Editor/Render ---
bind-key -n C-Space run-shell "$NEXUS_HOME/lib/swap.sh"

# --- Swap Tree (Alt+Shift+G) - Toggle Tree/Git ---
bind-key -n M-G run-shell "$NEXUS_HOME/lib/tree_swap.sh"

# Master Switcher (Alt-m) - Mosaic Mission Control
bind-key -n M-m run-shell "${NEXUS_HOME}/core/mosaic_engine.sh start"

# Focus Mode (Alt-z) - Maximize current pane
bind-key -n M-z run-shell "${NEXUS_HOME}/core/commands/focus.sh"

# --- Git (Alt+G) --- lazygit in a popup
bind-key -n M-g display-popup -E -w 90% -h 90% "lazygit"

# --- AI Context (Alt+I / Alt+Shift+I) ---
bind-key -n M-i run-shell "$NEXUS_HOME/core/ai/send_context.sh"
bind-key -n M-I run-shell "$NEXUS_HOME/core/ai/pipe_error.sh"

# ============================================================
# NORMAL MODE (Alt+Escape to enter, Escape to exit)
# ============================================================
bind-key -n M-Escape set -g @nexus_mode "NORMAL" \; switch-client -T nexus \; refresh-client -S

# Nexus key table (active in NORMAL mode)
bind-key -T nexus Escape set -g @nexus_mode "INSERT" \; switch-client -T root \; refresh-client -S

# Navigation (NORMAL mode) - single letter keys
bind-key -T nexus n select-pane -t tree
bind-key -T nexus p select-pane -t menu
bind-key -T nexus e select-pane -t editor
bind-key -T nexus t select-pane -t terminal
bind-key -T nexus c select-pane -t chat

# Also support 12345 in normal mode
bind-key -T nexus 1 select-pane -t tree
bind-key -T nexus 2 select-pane -t menu
bind-key -T nexus 3 select-pane -t editor
bind-key -T nexus 4 select-pane -t terminal
bind-key -T nexus 5 select-pane -t chat

# Directional in NORMAL mode
bind-key -T nexus h run-shell "$NEXUS_HOME/lib/plane_nav.sh left"
bind-key -T nexus j run-shell "$NEXUS_HOME/lib/plane_nav.sh down"
bind-key -T nexus k run-shell "$NEXUS_HOME/lib/plane_nav.sh up"
bind-key -T nexus l run-shell "$NEXUS_HOME/lib/plane_nav.sh right"

# Resizing (NORMAL mode, Shift + H/J/K/L)
bind-key -T nexus H resize-pane -L 5
bind-key -T nexus L resize-pane -R 5
bind-key -T nexus K resize-pane -U 3
bind-key -T nexus J resize-pane -D 3

# Quick Actions (NORMAL mode)
bind-key -T nexus q run-shell "$NEXUS_HOME/core/boot/dispatch.sh q"
bind-key -T nexus v run-shell "$NEXUS_HOME/lib/swap.sh"
bind-key -T nexus ? display-message "Panes: n/1=tree e/2=editor t/3=term c/4=chat | hjkl=move | HJKL=resize | v=swap q=quit"

# Return to INSERT after Enter
bind-key -T nexus Enter set -g @nexus_mode "INSERT" \; switch-client -T root \; refresh-client -S
