# Nexus Minimal Keybinds
# For the purist who wants to keep Tmux as close to stock as possible.

# --- Core Navigation (Only Alt+[,] for tabs) ---
bind-key -n M-p display-popup -E -w 70% -h 60% "$NEXUS_HOME/core/exec/nxs-palette.sh"
bind-key -n M-[ run-shell "$NEXUS_HOME/core/exec/nxs-tab.sh '' prev"
bind-key -n M-] run-shell "$NEXUS_HOME/core/exec/nxs-tab.sh '' next"

# --- Essential Hooks ---
bind-key -n C-Space run-shell "$NEXUS_HOME/lib/swap.sh"
bind-key -n M-m run-shell "${NEXUS_HOME}/core/mosaic_engine.sh start"
bind-key -n M-x run-shell "$NEXUS_HOME/core/exec/alt_x_handler.sh '#{pane_id}' '#{pane_pid}'"

# Everything else is standard Tmux prefix navigation.
