# Nexus Shell: User Keybind Config
# ================================
# Edit this file to remap any keybind.
# Changes take effect after: tmux source-file $NEXUS_HOME/config/tmux/nexus.conf
#
# Format:
#   NEXUS_KEY_<ACTION>=<key>      (tmux notation: M-v = Alt-v, C-e = Ctrl-e)

# -------------------------------------------------------
# LAYER 1: Nexus IDE Keys (Alt-*, global, Tmux root table)
# These work in ANY pane at all times.
# -------------------------------------------------------
NEXUS_KEY_SPLIT_VERTICAL=M-v
NEXUS_KEY_SPLIT_HORIZONTAL=M-s
NEXUS_KEY_CLOSE_PANE=M-w
NEXUS_KEY_FOCUS_TOGGLE=M-f
NEXUS_KEY_PANE_LEFT=M-h
NEXUS_KEY_PANE_DOWN=M-j
NEXUS_KEY_PANE_UP=M-k
NEXUS_KEY_PANE_RIGHT=M-l
NEXUS_KEY_ROLE_MENU=M-x
NEXUS_KEY_JUMP_MENU=M-P
NEXUS_KEY_GIT=M-g
NEXUS_KEY_FIND_FILE=M-F
NEXUS_KEY_CMD_PALETTE=C-\\

# -------------------------------------------------------
# LAYER 2: Menu Action Keys (Ctrl-*, fzf-internal only)
# These only activate when the fzf menu has focus.
# Bare keys (a-z, 0-9) are consumed by fzf search — do not assign bare keys here.
# -------------------------------------------------------
NEXUS_MENU_EXECUTE=enter
NEXUS_MENU_EDIT=ctrl-e
NEXUS_MENU_FAVORITE=ctrl-f
NEXUS_MENU_DRILL_IN=ctrl-o
NEXUS_MENU_BACK=ctrl-b
NEXUS_MENU_EXIT=esc

# -------------------------------------------------------
# WINDOW SLOTS (Alt-1 through Alt-9)
# -------------------------------------------------------
# Slots are always Alt-1..9. Not individually remappable yet.
