# Nexus Default Keybinds (Alt-Centric)
# Optimized for high-speed navigation without prefix keys.

# --- Level 1.1: Core Navigation (Alt-0 to Alt-9) ---
set-option -g pane-border-status top
set-option -g pane-border-format " (#[fg=cyan]#{pane_id}#[default]) "
bind-key -n M-1 run-shell "$NEXUS_KERNEL/exec/slot.sh 1"
bind-key -n M-2 run-shell "$NEXUS_KERNEL/exec/slot.sh 2"
bind-key -n M-3 run-shell "$NEXUS_KERNEL/exec/slot.sh 3"
bind-key -n M-4 run-shell "$NEXUS_KERNEL/exec/slot.sh 4"
bind-key -n M-5 run-shell "$NEXUS_KERNEL/exec/slot.sh 5"
bind-key -n M-6 run-shell "$NEXUS_KERNEL/exec/slot.sh 6"
bind-key -n M-7 run-shell "$NEXUS_KERNEL/exec/slot.sh 7"
bind-key -n M-8 run-shell "$NEXUS_KERNEL/exec/slot.sh 8"
bind-key -n M-9 run-shell "$NEXUS_KERNEL/exec/slot.sh 9"
bind-key -n M-0 run-shell "$NEXUS_KERNEL/exec/slot.sh 10"

# --- Level 1.2: New / New Tab / Launcher (Capabilities) ---
bind-key -n M-n run-shell "$NEXUS_HOME/core/kernel/stack/stack push local \"$NEXUS_HOME/modules/menu/bin/nexus-menu --context system:modules:all\" Capabilities"

# --- Level 1.5: Nexus-Tab Navigation (Alt+Shift+[ / Alt+Shift+]) ---
bind-key -n 'M-{' run-shell "$NEXUS_KERNEL/exec/tabs.sh '' nexus-prev"
bind-key -n 'M-}' run-shell "$NEXUS_KERNEL/exec/tabs.sh '' nexus-next"
bind-key -n 'M-t' run-shell "$NEXUS_HOME/core/kernel/stack/stack push local \"$NEXUS_HOME/modules/menu/bin/nexus-menu --context local_stack\" \"Active Stack\""
bind-key -n 'M-T' run-shell "$NEXUS_HOME/core/kernel/stack/stack push local \"$NEXUS_HOME/modules/menu/bin/nexus-menu --context local_stack\" \"Active Stack\""

# --- Level 2: Modular Pane Management (Splits & Closing) ---
bind-key -n 'M-v' split-window -h -c "#{pane_current_path}" \; set-option -p -t + @nexus_role "" \; set-option -p -t + @nexus_stack_id ""
bind-key -n 'M-s' split-window -v -c "#{pane_current_path}" \; set-option -p -t + @nexus_role "" \; set-option -p -t + @nexus_stack_id ""
bind-key -n 'M-[' run-shell "$NEXUS_KERNEL/stack/stack prev local"
bind-key -n 'M-]' run-shell "$NEXUS_KERNEL/stack/stack next local"
bind-key -n 'M-=' resize-pane -y 2
bind-key -n 'M-w' run-shell "$NEXUS_KERNEL/stack/stack close local"
bind-key -n 'M-x' run-shell "$NEXUS_KERNEL/stack/stack close local"
bind-key -n 'M--' run-shell "$NEXUS_KERNEL/exec/dock.sh toggle"
bind-key -n 'M-_' run-shell "$NEXUS_KERNEL/exec/dock.sh toggle"

# --- Core Directional Naviagtion (Alt+hjkl) ---
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# --- Direct Pane Jump (Alt+n/p/e/t/c) ---
# --- Direct Pane Jump (Alt+e/c) ---
bind-key -n M-e run-shell "tmux select-pane -t editor"
bind-key -n M-c run-shell "tmux select-pane -t chat"

# --- Essential Actions ---
bind-key -n M-p display-popup -E -w 70% -h 60% "$NEXUS_KERNEL/exec/palette.sh"
bind-key -n M-P run-shell "tmux select-pane -t menu"
bind-key -n C-\\ command-prompt -p ":" "run-shell '\$NEXUS_BOOT/dispatch.sh %%'"
bind-key -n M-q confirm-before -p "Kill physical pane? (y/n)" "kill-pane"
bind-key -n 'M-V' run-shell "$NEXUS_KERNEL/exec/preview.sh"
bind-key -n C-A run-shell "$NEXUS_BOOT/dispatch.sh actions"

# --- Search & Navigation ---
bind-key -n 'M-f' resize-pane -Z
bind-key -n 'M-F' display-popup -E -w 80% -h 80% "$NEXUS_ENGINE/search/quick_find.sh"
# bind-key -n 'M-j' run-shell "${NEXUS_HOME}/core/nav/jump.sh"
