# Nexus Default Keybinds (Alt-Centric)
# Optimized for high-speed navigation without prefix keys.

# --- Level 1: Nexus Slot Navigation (Alt+1...9) ---
bind-key -n M-1 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 1"
bind-key -n M-2 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 2"
bind-key -n M-3 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 3"
bind-key -n M-4 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 4"
bind-key -n M-5 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 5"
bind-key -n M-6 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 6"
bind-key -n M-7 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 7"
bind-key -n M-8 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 8"
bind-key -n M-9 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 9"
bind-key -n M-0 run-shell "$NEXUS_HOME/core/exec/nxs-slot.sh 10"

# --- Level 1.5: Nexus-Tab Navigation (Alt+Shift+[ / Alt+Shift+]) ---
bind-key -n 'M-{' run-shell "$NEXUS_HOME/core/exec/nxs-tab.sh '' nexus-prev"
bind-key -n 'M-}' run-shell "$NEXUS_HOME/core/exec/nxs-tab.sh '' nexus-next"
bind-key -n 'M-T' run-shell "$NEXUS_HOME/core/exec/nxs-tab.sh nexus new"

# --- Level 2: Modular Pane Management (Splits & Closing) ---
bind-key -n 'M-v' split-window -h -c "#{pane_current_path}" \; set-option -p -t + @nexus_role ""
bind-key -n 'M-s' split-window -v -c "#{pane_current_path}" \; set-option -p -t + @nexus_role ""
bind-key -n 'M-[' run-shell "$NEXUS_HOME/core/stack/nxs-stack prev local"
bind-key -n 'M-]' run-shell "$NEXUS_HOME/core/stack/nxs-stack next local"
bind-key -n 'M-=' run-shell "$NEXUS_HOME/core/stack/nxs-stack push local intent:default"
bind-key -n 'M-w' run-shell "$NEXUS_HOME/core/stack/nxs-stack close local"
bind-key -n 'M--' run-shell "$NEXUS_HOME/core/exec/nxs-dock.sh toggle"
bind-key -n 'M-_' run-shell "$NEXUS_HOME/core/exec/nxs-dock.sh toggle"

# --- Core Directional Naviagtion (Alt+hjkl) ---
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# --- Direct Pane Jump (Alt+n/p/e/t/c) ---
bind-key -n M-n run-shell "tmux select-pane -t tree"
bind-key -n M-e run-shell "tmux select-pane -t editor"
bind-key -n M-t run-shell "tmux select-pane -t terminal"
bind-key -n M-c run-shell "tmux select-pane -t chat"

# --- Essential Actions ---
bind-key -n M-p display-popup -E -w 70% -h 60% "$NEXUS_HOME/core/exec/nxs-palette.sh"
bind-key -n M-P run-shell "tmux select-pane -t menu"
bind-key -n C-\\ command-prompt -p ":" "run-shell '$NEXUS_HOME/core/boot/dispatch.sh %%'"
bind-key -n M-x run-shell "$NEXUS_HOME/core/exec/alt_x_handler.sh '#{pane_id}' '#{pane_pid}'"
bind-key -n M-q run-shell "$NEXUS_HOME/core/stack/nxs-stack close '#{pane_id}'"
bind-key -n 'M-V' run-shell "$NEXUS_HOME/core/exec/nxs-preview.sh"
bind-key -n C-A run-shell "$NEXUS_HOME/core/boot/dispatch.sh actions"

# --- Search & Navigation ---
bind-key -n 'M-f' resize-pane -Z
bind-key -n 'M-F' display-popup -E -w 80% -h 80% "$NEXUS_HOME/core/search/quick_find.sh"
# bind-key -n 'M-j' run-shell "${NEXUS_HOME}/core/nav/jump.sh"
