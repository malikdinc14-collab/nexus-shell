# Nexus Vim-Heavy Keybinds
# Minimalist, modal-centric, and adheres to hjkl navigation.

# --- Modal Entry ---
# Normal mode is the primary way to move.
bind-key -n M-Escape switch-client -T nexus \; refresh-client -S

# --- Navigation (Prefix-free but directional) ---
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# --- Level 1: Nexus Slot Navigation (Prefix + 1...9) ---
# We use the prefix (Ctrl+b) to keep Alt free for other things.
bind-key 1 run-shell "$NEXUS_KERNEL/exec/slot.sh 1"
bind-key 2 run-shell "$NEXUS_KERNEL/exec/slot.sh 2"
bind-key 3 run-shell "$NEXUS_KERNEL/exec/slot.sh 3"
bind-key 4 run-shell "$NEXUS_KERNEL/exec/slot.sh 4"
bind-key 5 run-shell "$NEXUS_KERNEL/exec/slot.sh 5"

# --- Tab Navigation (Vim Style) ---
# Use gT and gt (via prefix)
bind-key [ run-shell "$NEXUS_KERNEL/exec/tabs.sh '' prev"
bind-key ] run-shell "$NEXUS_KERNEL/exec/tabs.sh '' next"
bind-key = run-shell "$NEXUS_KERNEL/exec/tabs.sh '' new"

# --- Workspace Navigation (Vim Style) ---
bind-key '{' run-shell "$NEXUS_KERNEL/exec/tabs.sh '' nexus-prev"
bind-key '}' run-shell "$NEXUS_KERNEL/exec/tabs.sh '' nexus-next"

# --- Omnibar ---
bind-key -n M-p display-popup -E -w 70% -h 60% "$NEXUS_KERNEL/exec/palette.sh"
