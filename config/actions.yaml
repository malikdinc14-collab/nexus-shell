# config/actions.yaml
# Global Action Registry for Nexus Shell
# Decouples the UI from specific shell commands.

actions:
  # Window Management
  restore: "restore"
  hard-reboot: "tmux kill-server"
  
  # Navigation
  focus_files: "tmux select-pane -t tree || tmux select-pane -t files"
  focus_editor: "tmux select-pane -t editor"
  focus_chat: "tmux select-pane -t chat"
  focus_terminal: "tmux select-pane -t terminal"
  quick_find: "$NEXUS_HOME/core/engine/search/quick_find.sh"

  # Shelf
  stow_pane: "shelf stow"
  recall_pane: "shelf recall"

  # Agents
  switch_model: "switch-model"
  set_role: "set-role"

# Identity Mappings
# Allows the dispatcher to find existing tabs in the stack.
identity:
  editor: "editor"
  explorer: "explorer"
  chat: "chat"
  terminal: "terminal"
