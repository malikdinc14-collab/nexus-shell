# Nexus Shell Role Configuration
# ================================
# This file defines default role mappings.
# 
# Priority (highest to lowest):
#   1. Environment variables (NEXUS_EDITOR, etc.)
#   2. ~/.nexus/profile.yaml (user profile from wizard)
#   3. This file (system defaults)
#
# Run 'nxs wizard' to configure your profile interactively.

roles:
  editor: nvim
  explorer: yazi
  chat: nxs-code
  terminal: zsh
  viewer: glow
  search: grepai

# Role descriptions (used by wizard)
role_descriptions:
  editor: "Code/text editing"
  explorer: "File navigation"
  chat: "AI pair programming"
  terminal: "Terminal enhancements"
  viewer: "Content viewing"
  search: "Code search"
