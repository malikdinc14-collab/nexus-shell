title: "Keychain Manager"
context: "keychain"
items:
  - label: "📋 List All Secrets"
    type: "ACTION"
    payload: "$NEXUS_CORE/exec/nxs-keychain.sh list | less -R"

  - label: "➕ Set Project Secret"
    type: "ACTION"
    payload: "echo -n 'Key Name: '; read k; echo -n 'Value: '; read -s v; $NEXUS_CORE/exec/nxs-keychain.sh set $k $v"

  - label: "🌍 Set Global Secret"
    type: "ACTION"
    payload: "echo -n 'Key Name: '; read k; echo -n 'Value: '; read -s v; $NEXUS_CORE/exec/nxs-keychain.sh set --global $k $v"

  - separator: true

  - label: "🗑️ Delete Secret"
    type: "ACTION"
    payload: "echo -n 'Key Name: '; read k; $NEXUS_CORE/exec/nxs-keychain.sh delete $k"
