title: "Settings"
context: "settings"
items:
  - label: "⚙️ Tmux Configuration (nexus.conf)"
    type: "ACTION"
    payload: "$EDITOR_CMD $NEXUS_HOME/config/tmux/nexus.conf"

  - label: "⚙️ Command Registry (registry.json)"
    type: "ACTION"
    payload: "$EDITOR_CMD $NEXUS_HOME/core/api/registry.json"

  - label: "⚙️ Default Composition (vscodelike.json)"
    type: "ACTION"
    payload: "$EDITOR_CMD $NEXUS_HOME/compositions/vscodelike.json"

  - label: "⚙️ Workspace Registry (registry.yaml)"
    type: "ACTION"
    payload: "$EDITOR_CMD $NEXUS_HOME/config/registry.yaml"

  - separator: true

  - label: "📁 Project Config (.nexus.yaml)"
    type: "ACTION"
    payload: "$EDITOR_CMD $PROJECT_ROOT/.nexus.yaml"

  - label: "📋 Home Menu (home.yaml)"
    type: "ACTION"
    payload: "$EDITOR_CMD $NEXUS_HOME/menus/home.yaml"
