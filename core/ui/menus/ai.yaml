title: "AI Cockpit & Models"
context: "ai"
items:
  - label: "🤖 Select Active Model (Direct)"
    type: "ACTION"
    payload: "/Users/Shared/Projects/model-server/bin/srv list | fzf --header 'Select Model' --reverse | awk '{print $1}' | xargs -I {} python3 /Users/Shared/Projects/model-server/bin/srv boot {}"

  - label: "🎨 Launch Model Preset (Combo)"
    type: "ACTION"
    payload: "cat /Users/Shared/Projects/model-server/data/presets.json | jq -r '.presets | keys[]' | fzf --header 'Select Preset' --reverse | xargs -I {} python3 /Users/Shared/Projects/model-server/bin/srv boot --preset {}"

  - label: "💬 Start Link to Pi"
    type: "ACTION"
    payload: "tmux send-keys -t chat 'pi' Enter"

  - label: "🔄 Refresh Registries"
    type: "ACTION"
    payload: "python3 /Users/Shared/Projects/model-server/srv-diag.py"

  - label: "🛠️ Setup AI Partner (Wizard)"
    type: "ACTION"
    payload: "tmux display-popup -E -w 60% -h 60% '$NEXUS_HOME/core/kernel/boot/ai_setup.sh'"

  - label: "🛡️ GAP Mission Chat (Pi)"
    type: "ACTION"
    payload: "tmux select-pane -t chat && tmux send-keys '$NEXUS_HOME/core/engine/ai/nxs-pi-gap.sh' Enter"

  - label: "🚀 Launch GAP Mission Control"
    type: "ACTION"
    payload: "tmux new-window -n 'GAP:Mission' 'nxs-launcher --comp gap-mission'"

  - separator: true

  - label: "📊 Live Bucket Dashboard"
    type: "ACTION"
    payload: "tmux display-popup -E -w 90% -h 80% 'python3 /Users/Shared/Projects/model-server/bin/srv dashboard'"

  - label: "🗑️ Kill Specific Bucket (Select)"
    type: "ACTION"
    payload: "python3 /Users/Shared/Projects/model-server/bin/srv status --json | jq -r '.slots[] | \"\\(.slot_id) \\(.model_id // \"empty\") (Port \\(.port))\"' | fzf --header 'Select Bucket to Kill' --reverse | awk '{print $1}' | xargs -I {} python3 /Users/Shared/Projects/model-server/bin/srv kill {}"

  - label: "🧨 Kill Mission Group (Mass Kill)"
    type: "ACTION"
    payload: "python3 /Users/Shared/Projects/model-server/bin/srv status --json | jq -r '.slots[].group_id | select(. != null)' | sort -u | fzf --header 'Select Mission Group to Kill' --reverse | xargs -I {} python3 /Users/Shared/Projects/model-server/bin/srv kill --group {}"

  - label: "📉 Stop All Inference"
    type: "ACTION"
    payload: "pkill -f 'serving.server' && echo 'Inference Stopped.'"

  - separator: true

  - label: "🛡️ Sovereignty Menu"
    type: "PLANE"
    payload: "sovereignty"
