title: "Sovereignty & Security"
context: "sovereignty"
items:
  - label: "🛡️ Nexus Guard (Registry)"
    type: "ACTION"
    payload: "nvim $NEXUS_HOME/config/safety.yaml"

  - label: "🔑 Keychain Manager"
    type: "PLANE"
    payload: "keychain"

  - label: "🚀 GAP: Launch Mission"
    type: "ACTION"
    payload: "$NEXUS_CORE/services/gap_bridge.sh run"

  - label: "🤖 AI & Models"
    type: "PLANE"
    payload: "ai"

  - separator: true

  - label: "💾 Save All Windows"
    type: "ACTION"
    payload: "python3 $NEXUS_KERNEL/layout/save_layout.py --all && echo 'Full Session Saved!'"

  - label: "🔄 Restore Layout"
    type: "ACTION"
    payload: "$NEXUS_BOOT/launcher.sh --composition last"

  - separator: true

  - label: "⚠️ Reset Permissions"
    type: "ACTION"
    payload: "rm -f .nexus/permissions.json && echo 'Permissions Cleared.'"
